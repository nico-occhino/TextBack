project:
  name: "TextBack"
  seed: 42
  device: "cuda"
  dry_run: false

paths:
  prompts_dir: "prompts"
  results_dir: "results"
  generated_images_dir: "results/generated_images"
  logs_dir: "results/logs"
  imagenet_root: "data/imagenet"
  imagenet_subset_root: "data/imagenet_subset"

experiment:
  target_classes:
    - "tabby"
    - "sports car"
    - "cowboy hat"
    - "volcano"
    - "book jacket"
  n_optimization_steps: 10
  n_inference_images: 100
  top_k: 5

textgrad:
  backward_engine: "experimental:groq/openai/gpt-oss-20b"
  cache: true
  use_llm_initial_prompt: true
  initial_prompt_temperature: 0.2
  initial_prompt_max_retries: 3
  fallback_on_initial_prompt_failure: true
  max_prompt_words: 55
  sleep_seconds_after_step: 35
  max_retries_on_rate_limit: 5

descriptor_memory:
  enabled: true
  max_descriptors_per_class: 12
  max_descriptor_words: 6
  positive_rank_threshold: 5
  min_confidence_threshold: 0.03

image_generator:
  provider: "diffusers"
  model_name: "runwayml/stable-diffusion-v1-5"
  height: 384
  width: 384
  num_inference_steps: 30
  guidance_scale: 7.5
  use_float16: true
  force_float32: false
  enable_attention_slicing: true
  enable_cpu_offload: false
  disable_safety_checker: true
  base_seed: 42
  vary_seed: true

classifier:
  provider: "robustbench"
  model_name: "Salman2020Do_R50"
  threat_model: "Linf"
  dataset: "imagenet"
  image_size: 224
