project:
  name: "TextBack"
  seed: 42
  device: "cpu"
  dry_run: true

paths:
  prompts_dir: "prompts"
  results_dir: "results"
  generated_images_dir: "results/generated_images"
  logs_dir: "results/logs"
  imagenet_root: "data/imagenet"

experiment:
  target_classes:
    - "school bus"
    - "golden retriever"
  n_optimization_steps: 3
  n_inference_images: 5
  top_k: 5
  save_intermediate_artifacts: true
  save_only_final_inference_images: true

llm:
  provider: "dummy"
  model_name: "dummy-llm"

image_generator:
  provider: "dummy"
  model_name: "runwayml/stable-diffusion-v1-5"
  height: 512
  width: 512
  num_inference_steps: 20
  guidance_scale: 7.5
  use_float16: true

classifier:
  provider: "mock"
  model_name: "resnet50"
  weights: "IMAGENET1K_V2"
  robust_model: false
  image_size: 224
