project:
  name: "TextBack"
  seed: 42
  device: "cuda"
  dry_run: false

paths:
  prompts_dir: "prompts"
  results_dir: "results"
  generated_images_dir: "results/generated_images"
  logs_dir: "results/logs"
  imagenet_root: "data/imagenet"
  imagenet_subset_root: "data/imagenet_subset"

experiment:
  target_classes:
    - "school bus"
  n_optimization_steps: 1
  n_inference_images: 1
  top_k: 5
  save_intermediate_artifacts: true
  save_only_final_inference_images: false

textual_optimizer:
  backend: "textgrad"
  objective_mode: "prototype"

textgrad:
  backward_engine: "experimental:gemini/gemini-3.5-flash"
  cache: true

image_generator:
  provider: "diffusers"
  model_name: "runwayml/stable-diffusion-v1-5"
  height: 384
  width: 384
  num_inference_steps: 10
  guidance_scale: 7.5
  use_float16: true
  force_float32: false
  enable_attention_slicing: true
  enable_cpu_offload: false
  disable_safety_checker: true

classifier:
  provider: "torchvision"
  model_name: "resnet50"
  weights: "IMAGENET1K_V2"
  robust_model: false
  image_size: 224
